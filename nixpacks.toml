# Railway Nixpacks Configuration
# Ensures both Node.js and Python are installed in the container

[providers]
# Python for FastAPI backend
python = "3.12"
# Node.js for React frontend
nodejs = "20"

[variables]
# Build configuration
NODE_ENV = "production"
PIP_CACHE_DIR = "/tmp/pip-cache"
PYTHONPATH = "/app"

[phases.setup]
# Setup both environments
nixpkgs = ["python312", "nodejs_20", "npm"]

[phases.install]
# Install dependencies in correct order
cmds = [
  "pip install -r requirements.txt",
  "npm ci --omit=dev --prefer-offline --no-audit",
  "cd order-delight-main && npm ci --omit=dev --prefer-offline --no-audit && cd .."
]

[phases.build]
# Build frontend
cmds = ["cd order-delight-main && npm run build && cd .."]

[start]
# Start both services concurrently from correct directory
cmd = "cd /app && bash start.sh"