[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

[phases.setup]
nixPkgs = ["python312", "nodejs_20"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install -r requirements-production.txt",
  "npm ci --omit=dev",
  "cd order-delight-main && npm ci --omit=dev"
]

[phases.build]
cmds = [
  "cd order-delight-main && npm run build"
]

[start]
cmd = "bash start.sh"