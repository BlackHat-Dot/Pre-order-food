[phases.setup]
nixPkgs = ["python312Packages.pip", "python312", "nodejs_20"]

[phases.install]
cmds = [
  "pip install --break-system-packages -r requirements-production.txt",
  "npm install",
  "cd order-delight-main && npm install"
]

[phases.build]
cmds = [
  "cd order-delight-main && npm run build"
]

[start]
cmd = "bash start.sh"